name: deploy-production

# Deploys the current main branch to Railway. Runs in two situations:
#   - workflow_dispatch: manual bootstrap / ad-hoc redeploys.
#   - workflow_call: invoked by the release-please workflow when a release is
#     created, so production deploys are gated on an actual release.

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "$RAILWAY_SERVICE" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
